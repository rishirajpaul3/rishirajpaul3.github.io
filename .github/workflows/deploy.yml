name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  schedule:
    # Rebuild every 6 hours — keeps GitHub stats fresh
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Refresh GitHub data
        run: |
          mkdir -p public
          curl -sf "https://api.github.com/users/rishirajpaul3/repos?sort=updated&per_page=20" \
            -H "Accept: application/vnd.github+json" \
            > public/github-repos.json || true
          curl -sf "https://api.github.com/users/rishirajpaul3" \
            -H "Accept: application/vnd.github+json" \
            > public/github-profile.json || true

      - name: Install & build
        run: |
          npm ci
          npm run build

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
          force_orphan: true
