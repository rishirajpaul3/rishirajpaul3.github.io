name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Refresh live data
        run: |
          mkdir -p public
          curl -sf "https://api.github.com/users/rishirajpaul3/repos?sort=updated&per_page=20" \
            -H "Accept: application/vnd.github+json" > public/github-repos.json || echo "[]" > public/github-repos.json
          curl -sf "https://api.github.com/users/rishirajpaul3" \
            -H "Accept: application/vnd.github+json" > public/github-profile.json || echo "{}" > public/github-profile.json
          echo "Refreshed at $(date -u)" > public/last-updated.txt

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          STATIC_EXPORT: "true"

      - name: Deploy to gh-pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: out
          branch: gh-pages
          clean: true
